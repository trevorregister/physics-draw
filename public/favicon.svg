<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0ea5e9"/>

  <!-- Left vector -->
  <line x1="16" y1="16" x2="5" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polygon points="3,16 7,13.5 7,18.5" fill="white"/>

  <!-- Down vector -->
  <line x1="16" y1="16" x2="16" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polygon points="16,29 13.5,25 18.5,25" fill="white"/>

  <!-- Up-and-to-the-right vector -->
  <line x1="16" y1="16" x2="25" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polygon points="27,5 23.5,9.5 28.5,9.5" fill="white" transform="rotate(45, 27, 5)"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="white"/>
</svg>